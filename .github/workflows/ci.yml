name: ci

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14

      - name: Summarize coverage in job
        if: always()
        run: |
          if [ -f coverage/cobertura-coverage.xml ]; then
            line_rate=$(grep -m1 -oP 'line-rate="\K[^"]+' coverage/cobertura-coverage.xml || echo "0")
            branch_rate=$(grep -m1 -oP 'branch-rate="\K[^"]+' coverage/cobertura-coverage.xml || echo "0")
            line_pct=$(awk -v r="$line_rate" 'BEGIN{printf "%.2f", r*100}')
            branch_pct=$(awk -v r="$branch_rate" 'BEGIN{printf "%.2f", r*100}')
            {
              echo "### Coverage"
              echo ""
              echo "| Metric | % |"
              echo "| --- | --- |"
              echo "| Lines | ${line_pct}% |"
              echo "| Branches | ${branch_pct}% |"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  build:
    needs: [typecheck, test]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/maxmaxme/ru-meters-bot:latest
            ghcr.io/maxmaxme/ru-meters-bot:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
